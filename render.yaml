services:
  - type: web
    name: ombor-backend
    env: node
    plan: free
    buildCommand: "echo 'No build step needed'"
    startCommand: "node server.js"
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: NODE_VERSION
        value: 22
